"Invalid credentials.": "Identifiants invalides."
"Invalid or expired login link.": "Lien de connexion invalide ou expiré."
"Too many failed login attempts, please try again later.": "Trop de tentatives de connexion échouées, veuillez réessayer plus tard."
"Account is disabled.": "Ce compte est désactivé."
"Account is locked.": "Ce compte est verrouillé."
"Account has expired.": "Ce compte a expiré."
"Credentials have expired.": "Les identifiants ont expiré."
"An authentication exception occurred.": "Une erreur d'authentification est survenue."
"Authentication credentials could not be found.": "Les identifiants d'authentification n'ont pas été trouvés."
"Not privileged to request the resource.": "Vous n'avez pas les droits pour accéder à cette ressource."
"Invalid CSRF token.": "Jeton CSRF invalide."
"No authentication provider found to support the authentication token.": "Aucun fournisseur d'authentification trouvé."
"Username could not be found.": "Nom d'utilisateur introuvable."
"Account is not fully authenticated.": "Le compte n'est pas entièrement authentifié."
